<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — overridden per-page by seo.ts setSEO() -->

    <meta name="description" content="Compare golf carts for sale, local dealers, prices, deal ratings, battery types, warranties, and delivery options across Florida and Georgia." />
    <meta name="robots" content="index,follow" />
    <meta name="google-site-verification" content="Mv-uVOD3UiKM-beaV4zidms5l2dM7VEBi0HhZhQvqQo" />
    <meta name="author" content="GolfCartIQ" />
    <link rel="canonical" href="https://golfcartiq.com/" />

    <!-- Sitemap discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GolfCartIQ" />
    <meta property="og:title" content="GolfCartIQ | Golf Cart Price Intelligence for Florida &amp; Georgia" />
    <meta property="og:description" content="Compare golf carts for sale, local dealers, prices, deal ratings, battery types, warranties, and delivery options across Florida and Georgia." />
    <meta property="og:image" content="https://golfcartiq.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GolfCartIQ | Golf Cart Price Intelligence for Florida &amp; Georgia" />
    <meta property="og:url" content="https://golfcartiq.com/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GolfCartIQ" />
    <meta name="twitter:title" content="GolfCartIQ | Golf Cart Price Intelligence for Florida &amp; Georgia" />
    <meta name="twitter:description" content="Compare dealer prices, check fair value, and find the best golf cart deals in FL &amp; GA." />
    <meta name="twitter:image" content="https://golfcartiq.com/og-image.png" />
    <meta name="twitter:image:alt" content="GolfCartIQ | Golf Cart Price Intelligence for Florida &amp; Georgia" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts: Inter variable — self-hosted, no render-blocking network request -->
    <link rel="preload" href="/fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin />

    <!--
      NOTE: No base JSON-LD here. seo.ts injects all structured data
      dynamically per-page so there is never a duplicate or stale schema.
      Google will always see the correct per-page @graph.
    -->

    <!-- Google Analytics 4 — deferred until first user interaction
         Defines gtag() stub immediately so early events queue correctly.
         The heavy GTM script (155 KiB) only loads after click/scroll/touch,
         keeping it off the critical path for FCP and LCP. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6BXPEYSEB5');

      // Lazy-load the GTM script after first user interaction
      (function() {
        var loaded = false;
        function loadGA() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-6BXPEYSEB5';
          document.head.appendChild(s);
        }
        ['click','scroll','touchstart','keydown'].forEach(function(evt) {
          window.addEventListener(evt, loadGA, { once: true, passive: true });
        });
        // Fallback: load after 5s even if no interaction (covers bots / PSI)
        setTimeout(loadGA, 5000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
